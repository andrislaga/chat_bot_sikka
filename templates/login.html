<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin SISKA - BPS Sikka</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #003366 0%, #005599 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .login-wrapper {
            width: 100%;
            max-width: 420px;
            padding: 16px;
        }
        .login-card {
            border-radius: 16px;
            background: white;
            padding: 40px 36px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 28px;
        }
        .logo-area .icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 8px;
        }
        .logo-area h4 {
            color: #003366;
            font-weight: 700;
            margin: 0;
        }
        .logo-area p {
            color: #6c757d;
            font-size: 0.85rem;
            margin: 4px 0 0;
        }
        .form-control:focus {
            border-color: #003366;
            box-shadow: 0 0 0 0.2rem rgba(0,51,102,0.15);
        }
        .btn-login {
            background-color: #003366;
            border: none;
            padding: 10px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .btn-login:hover {
            background-color: #004488;
        }
        .footer-text {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.7);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo-area">
                <span class="icon">📊</span>
                <h4>SISKA Admin Panel</h4>
                <p>BPS Kabupaten Sikka — Sistem Informasi Chatbot</p>
            </div>

            <!-- ✅ Pesan Error Login Gagal -->
            {% if error == '1' %}
            <div class="alert alert-danger d-flex align-items-center py-2 mb-3" role="alert">
                <span class="me-2">⚠️</span>
                <div>Username atau password <strong>salah</strong>. Coba lagi.</div>
            </div>
            {% endif %}

            <form action="/login" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold text-muted small">USERNAME</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">👤</span>
                        <input
                            type="text"
                            name="username"
                            class="form-control border-start-0 ps-0"
                            placeholder="Masukkan username"
                            autofocus
                            required
                        >
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold text-muted small">PASSWORD</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">🔒</span>
                        <input
                            type="password"
                            name="password"
                            id="passwordInput"
                            class="form-control border-start-0 ps-0"
                            placeholder="Masukkan password"
                            required
                        >
                        <button
                            type="button"
                            class="btn btn-outline-secondary"
                            onclick="togglePassword()"
                            title="Tampilkan/Sembunyikan"
                        >👁️</button>
                    </div>
                </div>
                <button type="submit" class="btn btn-login btn-primary w-100">
                    Masuk Dashboard
                </button>
            </form>
        </div>

        <p class="footer-text">
            © 2024 BPS Kabupaten Sikka &nbsp;|&nbsp; SISKA v2.0
        </p>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            input.type = input.type === 'password' ? 'text' : 'password';
        }
    </script>
</body>
</html>
