<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISKA Chat Admin</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #e5ddd5;
    font-family: 'Segoe UI', sans-serif;
}

/* Layout */
.container-chat {
    display: flex;
    height: 100vh;
}

/* LEFT PANEL */
.sidebar {
    width: 30%;
    background: #fff;
    border-right: 1px solid #ddd;
    display: flex;
    flex-direction: column;
}

/* Header kiri */
.sidebar-header {
    padding: 10px;
    background: #f0f2f5;
    font-weight: bold;
}

/* Search */
.search-box {
    padding: 10px;
}

/* Tabs */
.tabs {
    padding: 0 10px 10px;
}

/* Chat list */
.chat-list {
    overflow-y: auto;
    flex: 1;
}

.chat-item {
    padding: 10px;
    border-bottom: 1px solid #eee;
    cursor: pointer;
}

.chat-item:hover {
    background: #f5f5f5;
}

.chat-item.active {
    background: #e9f5ff;
}

/* RIGHT PANEL */
.chat-area {
    width: 70%;
    display: flex;
    flex-direction: column;
}

/* Header kanan */
.chat-header {
    background: #f0f2f5;
    padding: 10px;
    border-bottom: 1px solid #ddd;
}

/* Chat body */
.chat-body {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
    background: #efeae2;
}

/* Bubble */
.msg {
    max-width: 60%;
    padding: 8px 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    font-size: 14px;
}

.msg-user {
    background: #fff;
}

.msg-admin {
    background: #d9fdd3;
    margin-left: auto;
}

/* Input */
.chat-input {
    padding: 10px;
    background: #f0f2f5;
    display: flex;
    gap: 10px;
}
</style>
</head>

<body>

<div class="container-chat">

    <!-- LEFT PANEL -->
    <div class="sidebar">

        <div class="sidebar-header">
            Obrolan
        </div>

        <!-- Search -->
        <div class="search-box">
            <input type="text" class="form-control" placeholder="Cari chat...">
        </div>

        <!-- Tabs -->
        <div class="tabs">
            <button class="btn btn-success btn-sm">Semua</button>
            <button class="btn btn-outline-secondary btn-sm">
                Belum dibaca <span class="badge bg-danger">2</span>
            </button>
        </div>

        <!-- Chat List -->
        <div class="chat-list">

            <!-- Item -->
            <div class="chat-item active">
                <div class="d-flex justify-content-between">
                    <strong>628123456789</strong>
                    <small>17.43</small>
                </div>
                <div class="d-flex justify-content-between">
                    <small>halo admin...</small>
                    <span class="badge bg-danger rounded-pill">2</span>
                </div>
                <small class="text-warning">Menunggu</small>
            </div>

            <div class="chat-item">
                <div class="d-flex justify-content-between">
                    <strong>628987654321</strong>
                    <small>17.20</small>
                </div>
                <small>data kemiskinan...</small><br>
                <small class="text-primary">Diproses</small>
            </div>

            <div class="chat-item">
                <div class="d-flex justify-content-between">
                    <strong>628555555555</strong>
                    <small>16.50</small>
                </div>
                <small>terima kasih</small><br>
                <small class="text-success">Selesai</small>
            </div>

        </div>
    </div>


    <!-- RIGHT PANEL -->
    <div class="chat-area">

        <!-- Header -->
        <div class="chat-header">
            <strong>628123456789</strong><br>
            <small class="text-warning">Menunggu</small>
        </div>

        <!-- Chat Body -->
        <div class="chat-body">

            <div class="msg msg-user">
                halo admin
            </div>

            <div class="msg msg-admin">
                iya, ada yang bisa dibantu?
            </div>

            <div class="msg msg-user">
                saya mau data bps
            </div>

        </div>

        <!-- Input -->
        <div class="chat-input">
            <input type="text" class="form-control" placeholder="Ketik pesan...">
            <button class="btn btn-success">Kirim</button>
        </div>

    </div>

</div>

</body>
</html>
